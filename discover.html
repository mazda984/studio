<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Discover Games</title>
<style>
  :root{
    --bg:#0b0b0b;--card:#111;--muted:#cfeee6;
  }
  html,body{height:100%;margin:0;background:var(--bg);color:#fff;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial}
  .wrap{max-width:1100px;margin:18px auto;padding:12px}
  .top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px}
  .title{font-weight:700;font-size:18px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
  .card{background:var(--card);border:1px solid rgba(255,255,255,0.03);border-radius:10px;padding:8px;display:flex;flex-direction:column;gap:8px}
  .cover{height:120px;background:linear-gradient(180deg,#101010,#0b0b0b);border-radius:6px;display:flex;align-items:center;justify-content:center;overflow:hidden}
  .cover img{width:100%;height:100%;object-fit:cover;display:block}
  .meta{display:flex;flex-direction:column;gap:6px}
  .gtitle{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .gsub{font-size:12px;color:var(--muted)}
  .row{display:flex;gap:8px;align-items:center}
  .btn{padding:6px 8px;border-radius:6px;background:#0e5c9f;border:1px solid #0e5c9f;color:#fff;font-size:13px;text-decoration:none;display:inline-block}
  .empty{padding:36px;text-align:center;color:var(--muted)}
  footer{margin-top:18px;font-size:12px;color:var(--muted);text-align:center}
</style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="title">Discover — Shared Games</div>
      <div style="font-size:13px;color:var(--muted)">See games others saved on this Studio</div>
    </div>

    <div id="list" class="grid" role="list"></div>

    <div id="empty" class="empty" style="display:none;">No shared games found on this site or in local saves.</div>

    <footer>Games discovered from local saves and same-origin pages; click Play to open the game embed.</footer>
  </div>

<script>
(function(){
  // Read saved list and discover site pages similarly to studio logic
  function getSavedProjects() {
    let list = [];
    try {
      const raw = localStorage.getItem("ministudio_saved_list");
      if (raw) {
        const parsed = JSON.parse(raw);
        if (Array.isArray(parsed)) list = parsed.slice();
      }
    } catch(e){}
    // Discover pages on same origin with likely game links
    try {
      const origin = window.location.origin;
      const anchors = Array.from(document.querySelectorAll('a[href]'));
      const keywords = ['/studio','/devdex','/games','/game','/play'];
      anchors.forEach(a=>{
        try{
          const href = a.href;
          if (!href || !href.startsWith(origin)) return;
          if (href === window.location.href) return;
          const path = href.slice(origin.length).toLowerCase();
          if (keywords.some(k=>path.includes(k))) {
            const title = (a.dataset.title || a.textContent || href).trim();
            const id = `site_${btoa(href).slice(0,12)}`;
            if (!list.find(l=>l.url===href)) {
              list.push({ id, title: title||href, url: href, site:true, cover:null, savedAt:0});
            }
          }
        }catch(e){}
      });
    } catch(e){}
    return list;
  }

  function createCard(rec){
    const el = document.createElement('div');
    el.className = 'card';
    const cover = document.createElement('div');
    cover.className = 'cover';
    const img = document.createElement('img');
    // Use cover if provided (rec.cover) else fallback to registered static asset or placeholder
    if (rec.cover) {
      img.src = rec.cover;
      img.alt = rec.title || 'Cover';
      cover.appendChild(img);
    } else {
      // show simple text placeholder
      const ph = document.createElement('div');
      ph.style.padding = '8px';
      ph.style.color = '#ddd';
      ph.style.fontSize = '13px';
      ph.textContent = rec.title ? rec.title.charAt(0).toUpperCase() : 'Game';
      cover.appendChild(ph);
    }
    el.appendChild(cover);

    const meta = document.createElement('div');
    meta.className = 'meta';
    const t = document.createElement('div');
    t.className = 'gtitle';
    t.textContent = rec.title || 'Untitled';
    const s = document.createElement('div');
    s.className = 'gsub';
    s.textContent = rec.site ? (rec.url || '') : (rec.savedAt ? new Date(rec.savedAt).toLocaleString() : '');
    meta.appendChild(t);
    meta.appendChild(s);
    el.appendChild(meta);

    const row = document.createElement('div');
    row.className = 'row';
    const play = document.createElement('a');
    play.className = 'btn';
    play.textContent = 'Play';
    play.href = '#';
    play.addEventListener('click', (e)=>{
      e.preventDefault();
      // If this is a site page, open it directly; else if encoded state present, open in embed mode
      if (rec.url) {
        try { window.open(rec.url,'_blank'); } catch(e){ window.location.href = rec.url; }
        return;
      }
      if (rec.encoded) {
        try {
          const url = new URL(window.location.pathname, window.location.origin);
          url.searchParams.set('state', rec.encoded);
          url.searchParams.set('embed', '1');
          window.open(url.toString(), '_blank');
        } catch(err) {
          alert('Failed to open game.');
        }
      } else {
        alert('No playable data for this entry.');
      }
    });
    row.appendChild(play);
    el.appendChild(row);
    return el;
  }

  function render(){
    const listEl = document.getElementById('list');
    const empty = document.getElementById('empty');
    listEl.innerHTML = '';
    const data = getSavedProjects();
    if (!data || data.length === 0) {
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';
    data.forEach(rec=>{
      // Make sure title exists
      if (!rec.title) rec.title = rec.url ? rec.url : 'Untitled';
      // Attempt to set a cover from encoded state if present: try decode minimal preview image url field if included
      // (many saved entries won't include covers; this is best-effort)
      const card = createCard(rec);
      listEl.appendChild(card);
    });
  }

  render();
})();
</script>
</body>
</html>
