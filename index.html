<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Devdex</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <link rel="stylesheet" href="style.css" />
  <script type="importmap">
    {
      "imports": {
        "nipplejs": "https://esm.sh/nipplejs",
        "blockly": "https://esm.sh/blockly@8.0.0"
      }
    }
  </script>
</head>
<body>
  <!-- Preloader shown during registration/site load; displays the Game Title from Properties -->
  <div id="preloader" aria-hidden="false">
    <div class="preloader-card">
      <div id="preloader-logo" class="preloader-logo">Title</div>
      <div class="preloader-title" id="preloader-title">Loading Game...</div>
      <div class="preloader-spinner" aria-hidden="true"></div>
    </div>
  </div>

  <div id="app">
    <!-- Left: Toolbox + Explorer -->
    <section class="panel panel-left">
      <!-- Top menu above Toolbox: shows Saved Games / Info outside the Toolbox panel itself -->
      <div style="display:flex;gap:8px;margin-bottom:8px;align-items:center;">
        <button id="saved-games-btn" class="toolbox-item" type="button" style="flex:1;min-width:0;padding:8px;">Saved Games</button>
        <button id="info-btn" class="toolbox-item" type="button" style="flex:0 0 auto;padding:8px 10px;">Info</button>
      </div>

      <div class="panel-section">
        <div class="panel-header">Toolbox</div>

        <div class="toolbox-items">
          <button class="toolbox-item" data-type="block">Block</button>
          <button class="toolbox-item" data-type="block">Block</button>
          <button class="toolbox-item" data-type="platform">Platform</button>
          <button class="toolbox-item" data-type="spawn">Spawn</button>
          <button class="toolbox-item" data-type="sword">Sword</button>
          <button class="toolbox-item" data-type="blaster">Blaster</button>
          <button class="toolbox-item" data-type="npc">NPC</button>
          <button class="toolbox-item" data-type="light">Light</button>
          <button class="toolbox-item" data-type="iframe">Iframe Block</button>
          <button class="toolbox-item" data-type="colliding">Colliding Block</button>
          <button class="toolbox-item" data-type="triggerpart">TriggerPart</button>
        </div>
      </div>
      <div class="panel-section panel-scroll">
        <div class="panel-header">Explorer</div>
        <ul id="explorer-list" class="explorer-list"></ul>
      </div>

      <div class="panel-section panel-scroll">
        <div class="panel-header">Coding</div>
        <div id="coding-area" class="coding-area">
          <!-- Blockly workspace will be injected here -->
          <div id="blocklyDiv" style="width:100%;height:320px;"></div>
          <div style="display:flex;gap:6px;margin-top:6px;">
            <button id="run-blocks" class="toolbox-item" style="flex:1">Run</button>
            <button id="export-blocks" class="toolbox-item" style="flex:1">Export</button>
            <button id="edit-iframe" class="toolbox-item" style="flex:1">Edit Iframe HTML</button>
          </div>
        </div>
      </div>
    </section>

    <!-- Center: Viewport -->
    <section class="viewport-wrapper">
      <div class="viewport-toolbar">
        <button data-tool="select" class="tool-button active">Select</button>
        <button data-tool="move" class="tool-button">Move</button>
        <button data-tool="resize" class="tool-button">Resize</button>
        <button data-tool="delete" class="tool-button">Delete</button>
      </div>
      <canvas id="viewport" width="800" height="600"></canvas>
      <div id="joystick-container"></div>
      <div class="playbar">
        <button id="play-btn">Play</button>
        <button id="stop-btn" disabled>Stop</button>
        <button id="embed-btn">Embed</button>
        <button id="save-btn">Save</button>
      </div>
    </section>

    <!-- Right: Properties -->
    <section class="panel panel-right">
      <div class="panel-section">
        <div class="panel-header">Properties</div>
        <div id="properties" class="properties">
          <div class="prop-row">
            <label>Name</label>
            <input id="prop-name" type="text" />
          </div>

          <div class="prop-row">
            <label>Image URL</label>
            <input id="prop-image-url" type="text" placeholder="https://example.com/element.png" />
          </div>

          <div class="prop-row">
            <label>Registered Asset</label>
            <select id="prop-image-asset">
              <option value="">(none)</option>
              <option value="https://static.wixstatic.com/media/0d7fec_f13a0cfb1daf43d1a1154f6302934430~mv2.jpg/v1/fill/w_558,h_287,al_c,q_80,enc_auto/bandicam%202026-05-06%2016-33-19-412.jpg">scratch_cat_obscured</option>
            </select>
          </div>

          <!-- Iframe block HTML editor (appears when an iframe block is selected) -->
          <div class="prop-row" style="grid-template-columns: 40% 60%;">
            <label>Iframe HTML</label>
            <textarea id="prop-iframe-html" placeholder="Paste HTML for iframe block..." style="width:100%;height:88px;border-radius:6px;border:1px solid #3a3a3a;background:#151515;color:#f5f5f5;padding:6px;font-size:12px"></textarea>
          </div>

          <div class="prop-row">
            <label>X</label>
            <input id="prop-x" type="number" step="1" />
          </div>
          <div class="prop-row">
            <label>Y</label>
            <input id="prop-y" type="number" step="1" />
          </div>
          <div class="prop-row">
            <label>Width</label>
            <input id="prop-w" type="number" step="1" />
          </div>
          <div class="prop-row">
            <label>Height</label>
            <input id="prop-h" type="number" step="1" />
          </div>
          <div class="prop-row">
            <label>Color</label>
            <input id="prop-color" type="color" />
          </div>
          <div class="prop-row">
            <label>Action</label>
            <select id="prop-action">
              <option value="none">None</option>
              <option value="checkpoint">Checkpoint</option>
              <option value="kill">Kill</option>
              <option value="revive">Revive</option>
            </select>
          </div>

          <!-- TriggerPart-specific property: choose what triggers this part -->
          <div class="prop-row">
            <label>Trigger Target</label>
            <select id="prop-trigger-target">
              <option value="">(none)</option>
              <option value="player">Player</option>
            </select>
          </div>

          <!-- TriggerPart action selector: pick a block from Explorer that will be revealed when triggered -->
          <div class="prop-row" style="grid-template-columns: 60% 40%;">
            <div style="display:flex;flex-direction:column;gap:4px;">
              <label style="font-size:11px;color:#b0b0b0">Assigned Block</label>
              <input id="prop-trigger-assigned-name" type="text" readonly placeholder="(none)" />
            </div>
            <div style="display:flex;align-items:center;justify-content:center;">
              <button id="prop-trigger-select-action" class="toolbox-item" style="padding:6px 8px;font-size:11px;">Select Action</button>
            </div>
          </div>

          <div class="prop-section-title">Game</div>
          <div class="prop-row">
            <label>Title</label>
            <input id="game-title" type="text" placeholder="My Awesome Game" />
          </div>

          <div class="prop-section-title">Character</div>
          <div class="prop-row">
            <label>Image URL</label>
            <input id="char-image-url" type="text" placeholder="https://..." />
          </div>

          <!-- Light-specific properties -->
          <div class="prop-section-title">Light</div>
          <div class="prop-row">
            <label>Intensity</label>
            <input id="prop-light-intensity" type="number" step="0.05" min="0" max="1" placeholder="0.9" />
          </div>
          <div class="prop-row">
            <label>Radius</label>
            <input id="prop-light-radius" type="number" step="4" min="8" placeholder="140" />
          </div>

          <div class="prop-section-title">Music</div>
          <div class="prop-row">
            <label>File</label>
            <input id="bg-music-file" type="file" accept="audio/*" />
          </div>
          <div class="prop-row">
            <label>URL</label>
            <input id="bg-music-url" type="text" placeholder="https://example.com/music.mp3" />
          </div>

          <div class="prop-section-title">Lighting</div>
          <div class="prop-row">
            <label>Mode</label>
            <select id="lighting-mode">
              <option value="normal">Normal</option>
              <option value="dark">Dark</option>
            </select>
          </div>
          <div class="prop-row">
            <label>Global Brightness</label>
            <input id="lighting-brightness" type="range" min="0" max="1" step="0.05" value="1" />
          </div>

          <div class="prop-section-title">Background</div>
          <div class="prop-row">
            <label>Image URL</label>
            <input id="bg-image-url" type="text" placeholder="https://example.com/bg.png" />
          </div>

          <div class="prop-section-title">Map</div>
          <div class="prop-row">
            <label>Map Width</label>
            <input id="map-width" type="number" step="10" min="100" placeholder="800" />
          </div>
          <div class="prop-row">
            <label>Map Height</label>
            <input id="map-height" type="number" step="10" min="100" placeholder="600" />
          </div>
          <div class="prop-row">
            <label>Camera X</label>
            <input id="cam-x" type="number" step="1" placeholder="0" />
          </div>
          <div class="prop-row">
            <label>Camera Y</label>
            <input id="cam-y" type="number" step="1" placeholder="0" />
          </div>

          <div class="prop-section-title">NPC</div>
          <div class="prop-row">
            <label>NPC Action</label>
            <select id="npc-action">
              <option value="none">None</option>
              <option value="attack">Attack</option>
              <option value="talk">Talk</option>
              <option value="jump">Jump</option>
              <option value="chase">Chase</option>
            </select>
          </div>
          <div class="prop-row">
            <label>NPC Text</label>
            <input id="npc-text" type="text" placeholder="Hello there!" />
          </div>
          <div class="prop-row">
            <label>NPC Range</label>
            <input id="npc-range" type="number" step="10" min="20" />
          </div>
          <div class="prop-row">
            <label>NPC Respawn</label>
            <select id="npc-respawn">
              <option value="no">No</option>
              <option value="yes">Yes</option>
            </select>
          </div>

          <div class="prop-section-title">Physics</div>
          <div class="prop-row">
            <label>Mass</label>
            <input id="prop-mass" type="number" step="0.1" min="0.01" placeholder="1.0" />
          </div>
          <div class="prop-row">
            <label>Friction</label>
            <input id="prop-friction" type="number" step="0.01" min="0" max="1" placeholder="0.15" />
          </div>
          <div class="prop-row">
            <label>Dynamic</label>
            <select id="prop-dynamic">
              <option value="yes">Yes</option>
              <option value="no">No</option>
            </select>
          </div>

          <div class="prop-section-title">Physics</div>
          <div class="prop-row">
            <label>Mass</label>
            <input id="prop-mass" type="number" step="0.1" min="0.01" placeholder="1.0" />
          </div>
          <div class="prop-row">
            <label>Friction</label>
            <input id="prop-friction" type="number" step="0.01" min="0" max="1" placeholder="0.15" />
          </div>
          <div class="prop-row">
            <label>Dynamic</label>
            <select id="prop-dynamic">
              <option value="yes">Yes</option>
              <option value="no">No</option>
            </select>
          </div>

          <div class="prop-section-title">AI</div>
          <div class="prop-row" style="grid-template-columns: 100%;">
            <textarea id="ai-prompt" placeholder="Describe the game you want the AI to create (e.g. '2-platform levels, a spawn, one enemy that chases, background music from URL')"
              style="width:100%;height:88px;border-radius:6px;border:1px solid #3a3a3a;background:#151515;color:#f5f5f5;padding:8px;font-size:12px"></textarea>
          </div>
          <div class="prop-row" style="gap:6px;">
            <button id="ai-generate" class="toolbox-item" style="flex:1">Generate Game</button>
            <button id="ai-cancel" class="toolbox-item" style="flex:1;display:none">Cancel</button>
          </div>

        </div>
      </div>
    </section>
  </div>

  <!-- Loading overlay -->
  <div id="loading-overlay" aria-hidden="true" style="display:none;">
    <div class="loading-card" role="status" aria-live="polite">
      <div id="loading-title" class="loading-title">Loading...</div>
      <div class="loading-bar-outer" aria-hidden="false">
        <div id="loading-bar" class="loading-bar"></div>
      </div>
      <div id="loading-percent" class="loading-percent">0%</div>
    </div>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
